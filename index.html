<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NameWorld — See What the World is Named</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<!-- Firebase -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getFirestore, collection, addDoc, onSnapshot, query } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyDLfuILR0OJh1toZrPJijOIfqsdVPj4CXI",
    authDomain: "nameworld.firebaseapp.com",
    projectId: "nameworld",
    storageBucket: "nameworld.firebasestorage.app",
    messagingSenderId: "883101372944",
    appId: "1:883101372944:web:89620be886839c2da63095"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  // Make db and functions available globally
  window._db = db;
  window._addDoc = addDoc;
  window._collection = collection;
  window._onSnapshot = onSnapshot;
  window._query = query;
  window._firebaseReady = true;

  // Start listening for name submissions in real time
  window.addEventListener('load', () => {
    startListening();
  });

  function startListening() {
    const q = query(collection(db, "names"));
    onSnapshot(q, (snapshot) => {
      snapshot.docChanges().forEach((change) => {
        if (change.type === "added") {
          const data = change.doc.data();
          // Add to local nameData
          if (!window.nameData[data.country]) window.nameData[data.country] = {};
          if (!window.nameData[data.country][data.name]) window.nameData[data.country][data.name] = 0;
          window.nameData[data.country][data.name]++;
        }
      });
      updateStats();
      renderSidebar(document.getElementById('searchInput')?.value?.trim() || '');
      refreshMarkers();
      if (window.selectedCountry) showDetail(window.selectedCountry);
    });
  }
</script>
<style>
  :root {
    --ink: #0d0d0d;
    --cream: #f5f0e8;
    --gold: #c8a84b;
    --gold-light: #e8d5a0;

  }

  .live-badge {

  }

  .add-name-btn {
    background: var(--gold);
    color: var(--ink);
    border: none;
    padding: 8px 20px;
    border-radius: 6px;
    font-family: 'DM Sans', sans-serif;

  .add-name-btn:hover { background: var(--gold-light); transform: translateY(-1px); }

  .stats-bar {
    background: var(--ink);

  .search-box {
    display: flex;
    align-items: center;
    gap: 8px;
    background: var(--cream);
    border: 1px solid var(--border);

  .search-box input {

  .region-btn.active { background: var(--ink); color: var(--cream); border-color: var(--ink); }

  .country-list {
    overflow-y: auto;

  .country-list::-webkit-scrollbar { width: 4px; }

  #map { width: 100%; height: 100%; z-index: 1; }

    from { opacity: 0; transform: translateX(20px); }
    to { opacity: 1; transform: translateX(0); }

  .detail-panel.visible { display: block; }

  .detail-header {
    background: var(--ink);
    color: var(--cream);
    padding: 1rem 1.2rem;
    border-radius: 14px 14px 0 0;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .detail-title { font-family: 'Playfair Display', serif; font-size: 1.1rem; font-weight: 700; }
  .close-btn { background: none; border: none; color: #aaa; cursor: pointer; font-size: 1.2rem; line-height: 1; transition: color 0.15s; }
  .close-btn:hover { color: white; }

  .detail-body { padding: 1rem; }

  .modal-overlay {

    opacity: 0; pointer-events: none;
    transition: opacity 0.2s;
  }
  .modal-overlay.open { opacity: 1; pointer-events: all; }

  .modal {
    background: white;
    border-radius: 16px;
    width: 420px;

    overflow: hidden;

  .no-results { padding: 2rem; text-align: center; color: #aaa; font-size: 0.9rem; }

  .search-result-item { padding: 10px 12px; border-radius: 8px; cursor: pointer; transition: background 0.1s; border-bottom: 1px solid var(--cream); }
  .search-result-item:hover { background: var(--cream); }
  .sr-name { font-weight: 600; font-size: 0.95rem; }
  .sr-locs { font-size: 0.78rem; color: #888; margin-top: 2px; }

  .leaflet-popup-content-wrapper { border-radius: 10px !important; box-shadow: var(--shadow) !important; padding: 0 !important; overflow: hidden; }
  .leaflet-popup-content { margin: 0 !important; }
  .popup-inner { padding: 12px 14px; min-width: 150px; }

  @media (max-width: 700px) {
    .main { grid-template-columns: 1fr; grid-template-rows: 45vh 1fr; }
    .sidebar { order: 2; height: 100%; }
    #map { height: 45vh; }
    .detail-panel { right: 10px; width: 240px; top: 60px; }
    .stats-bar { gap: 1rem; padding: 8px 1rem; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">Name<span>World</span></div>
  <div class="header-right">

<div class="main" style="position:relative;">
  <div class="sidebar">

      <div class="search-box">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>

        <div style="font-size:0.75rem;color:#aaa;margin-bottom:8px;text-transform:uppercase;letter-spacing:0.5px;">Top 10 Names</div>
        <ul class="rank-list" id="dpList"></ul>
      </div>

</div>

<!-- MODAL -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <div class="modal-header">
      <h2>Add Your Name</h2>
      <p>Help us map the world's names — one person at a time</p>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label>Your First Name</label>
        <input type="text" id="nameInput" placeholder="e.g. Maria, James, Yuki…" maxlength="40">
      </div>
      <div class="form-group">
        <label>Your Country</label>
        <select id="countrySelect"></select>
      </div>
      <div class="form-group">
        <label>State / Region <span style="color:#aaa;font-weight:300">(optional)</span></label>
        <input type="text" id="regionInput" placeholder="e.g. California, Kerala…" maxlength="60">
      </div>
      <button class="submit-btn" id="submitBtn" onclick="submitName()">🌍 Add My Name to the Map</button>
      <div class="cancel-link" onclick="closeModal()">Cancel</div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const COUNTRIES = [
  { name:"United States", flag:"🇺🇸", region:"Americas", lat:37.09, lng:-95.71 },
  { name:"United Kingdom", flag:"🇬🇧", region:"Europe", lat:55.37, lng:-3.43 },
  { name:"Canada", flag:"🇨🇦", region:"Americas", lat:56.13, lng:-106.34 },
  { name:"Australia", flag:"🇦🇺", region:"Oceania", lat:-25.27, lng:133.77 },
  { name:"Germany", flag:"🇩🇪", region:"Europe", lat:51.16, lng:10.45 },
  { name:"France", flag:"🇫🇷", region:"Europe", lat:46.22, lng:2.21 },
  { name:"Spain", flag:"🇪🇸", region:"Europe", lat:40.46, lng:-3.74 },
  { name:"Italy", flag:"🇮🇹", region:"Europe", lat:41.87, lng:12.56 },
  { name:"Japan", flag:"🇯🇵", region:"Asia", lat:36.20, lng:138.25 },
  { name:"India", flag:"🇮🇳", region:"Asia", lat:20.59, lng:78.96 },
  { name:"China", flag:"🇨🇳", region:"Asia", lat:35.86, lng:104.19 },
  { name:"Brazil", flag:"🇧🇷", region:"Americas", lat:-14.23, lng:-51.92 },
  { name:"Mexico", flag:"🇲🇽", region:"Americas", lat:23.63, lng:-102.55 },
  { name:"South Korea", flag:"🇰🇷", region:"Asia", lat:35.90, lng:127.76 },
  { name:"Nigeria", flag:"🇳🇬", region:"Africa", lat:9.08, lng:8.67 },
  { name:"South Africa", flag:"🇿🇦", region:"Africa", lat:-30.55, lng:22.93 },
  { name:"Egypt", flag:"🇪🇬", region:"Africa", lat:26.82, lng:30.80 },
  { name:"Philippines", flag:"🇵🇭", region:"Asia", lat:12.87, lng:121.77 },
  { name:"Indonesia", flag:"🇮🇩", region:"Asia", lat:-0.78, lng:113.92 },
  { name:"Netherlands", flag:"🇳🇱", region:"Europe", lat:52.13, lng:5.29 },
  { name:"Sweden", flag:"🇸🇪", region:"Europe", lat:60.12, lng:18.64 },
  { name:"Poland", flag:"🇵🇱", region:"Europe", lat:51.91, lng:19.14 },
  { name:"Argentina", flag:"🇦🇷", region:"Americas", lat:-38.41, lng:-63.61 },
  { name:"Turkey", flag:"🇹🇷", region:"Asia", lat:38.96, lng:35.24 },
  { name:"Pakistan", flag:"🇵🇰", region:"Asia", lat:30.37, lng:69.34 },
  { name:"Kenya", flag:"🇰🇪", region:"Africa", lat:-0.02, lng:37.90 },
  { name:"Ghana", flag:"🇬🇭", region:"Africa", lat:7.95, lng:-1.02 },
  { name:"New Zealand", flag:"🇳🇿", region:"Oceania", lat:-40.90, lng:174.88 },
  { name:"Portugal", flag:"🇵🇹", region:"Europe", lat:39.39, lng:-8.22 },
  { name:"Greece", flag:"🇬🇷", region:"Europe", lat:39.07, lng:21.82 },
];

// Global state
window.nameData = {};
window.selectedCountry = null;
let selectedRegion = 'all';
let map;
const markers = {};

function getTopNames(country, n = 10) {
  const data = window.nameData[country] || {};
  return Object.entries(data).sort((a, b) => b[1] - a[1]).slice(0, n);
}

function updateStats() {
  let total = 0, countries = 0;
  COUNTRIES.forEach(c => {
    const d = window.nameData[c.name] || {};
    const s = Object.values(d).reduce((a, b) => a + b, 0);
    if (s > 0) countries++;
    total += s;
  });
  document.getElementById('totalNames').textContent = total.toLocaleString();
  document.getElementById('totalCountries').textContent = countries;

  // Today count from localStorage
  const savedDate = localStorage.getItem('nw_date');
  const today = new Date().toDateString();
  const todayCount = savedDate === today ? (parseInt(localStorage.getItem('nw_today')) || 0) : 0;
  document.getElementById('todayCount').textContent = todayCount;
}

// SIDEBAR
function renderSidebar(filter = '') {
  const list = document.getElementById('countryList');
  if (filter.length > 1) { renderSearch(filter, list); return; }

  const visible = COUNTRIES.filter(c => selectedRegion === 'all' || c.region === selectedRegion);
  list.innerHTML = visible.map(c => {
    const top = getTopNames(c.name, 5);
    const total = Object.values(window.nameData[c.name] || {}).reduce((a,b)=>a+b,0);
    const chips = top.map(([n], i) => `<span class="name-chip rank-${i+1}">${n}</span>`).join('');
    const sel = window.selectedCountry === c.name ? 'selected' : '';
    return `<div class="country-card ${sel}" onclick="selectCountry('${c.name}')">
      <div class="country-card-header">
        <span class="flag">${c.flag}</span>
        <span class="country-name">${c.name}</span>
        <span class="count-badge">${total}</span>
      </div>
      <div class="top-names">${chips || '<span style="color:#bbb;font-size:0.75rem">No names yet</span>'}</div>
    </div>`;
  }).join('');
}

function renderSearch(q, list) {
  const lq = q.toLowerCase();
  const matchCountries = COUNTRIES.filter(c => c.name.toLowerCase().includes(lq));
  const grouped = {};
  COUNTRIES.forEach(c => {
    Object.entries(window.nameData[c.name] || {}).forEach(([n, count]) => {
      if (n.toLowerCase().includes(lq)) {
        if (!grouped[n]) grouped[n] = [];
        grouped[n].push({ country: c.name, flag: c.flag, count });
      }
    });
  });

  let html = '<div class="search-results">';
  if (!matchCountries.length && !Object.keys(grouped).length) {
    html += '<div class="no-results">No results found</div>';
  }
  matchCountries.forEach(c => {
    const top = getTopNames(c.name, 3).map(([n])=>n).join(', ') || 'No names yet';
    html += `<div class="search-result-item" onclick="selectCountry('${c.name}')">
      <div class="sr-name">${c.flag} ${c.name}</div>
      <div class="sr-locs">Top: ${top}</div>
    </div>`;
  });
  Object.entries(grouped).forEach(([name, locs]) => {
    const places = locs.map(l => `${l.flag} ${l.country}`).join(', ');
    html += `<div class="search-result-item">
      <div class="sr-name">👤 ${name}</div>
      <div class="sr-locs">${places}</div>
    </div>`;
  });
  html += '</div>';
  list.innerHTML = html;
}

function filterRegion(region, btn) {
  selectedRegion = region;
  document.querySelectorAll('.region-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('searchInput').value = '';
  renderSidebar();
}

function handleSearch(val) { renderSidebar(val.trim()); }

function selectCountry(name) {
  window.selectedCountry = name;
  renderSidebar(document.getElementById('searchInput').value.trim());
  showDetail(name);
  const c = COUNTRIES.find(x => x.name === name);
  if (c) map.setView([c.lat, c.lng], 5, { animate: true });
}

function showDetail(name) {
  const c = COUNTRIES.find(x => x.name === name);
  if (!c) return;
  const top = getTopNames(name, 10);
  const maxCount = top[0] ? top[0][1] : 1;

  document.getElementById('dpFlag').textContent = c.flag;
  document.getElementById('dpName').textContent = c.name;
  document.getElementById('dpList').innerHTML = top.length ? top.map(([n, count], i) => {
    const rClass = i === 0 ? 'r1' : i === 1 ? 'r2' : i === 2 ? 'r3' : '';
    const pct = Math.round((count / maxCount) * 100);
    return `<li class="rank-item">
      <div class="rank-num ${rClass}">${i+1}</div>
      <div class="rank-name">${n}</div>
      <div class="rank-bar-wrap"><div class="rank-bar" style="width:${pct}%"></div></div>
      <div class="rank-count">${count}</div>
    </li>`;
  }).join('') : '<li style="padding:1rem;color:#aaa;font-size:0.85rem">No names yet — be the first!</li>';

  document.getElementById('detailPanel').classList.add('visible');
}

function closeDetail() {
  document.getElementById('detailPanel').classList.remove('visible');
  window.selectedCountry = null;
  renderSidebar();
}

// MAP
function initMap() {
  map = L.map('map', { center: [20, 10], zoom: 2, zoomControl: true, attributionControl: false });
  L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', { maxZoom: 19 }).addTo(map);

  COUNTRIES.forEach(c => {
    const icon = L.divIcon({
      className: '',
      html: `<div style="background:white;border:2px solid #c8a84b;border-radius:8px;padding:3px 7px;font-family:'DM Sans',sans-serif;font-size:11px;font-weight:600;white-space:nowrap;box-shadow:0 2px 8px rgba(0,0,0,0.12);cursor:pointer;">${c.flag} —</div>`,
      iconSize: [null, null], iconAnchor: [0, 0]
    });
    const marker = L.marker([c.lat, c.lng], { icon }).addTo(map).on('click', () => selectCountry(c.name));
    markers[c.name] = marker;
  });
}

function refreshMarkers() {
  COUNTRIES.forEach(c => {
    const top = getTopNames(c.name, 1);
    const topName = top[0] ? top[0][0] : '—';
    const m = markers[c.name];
    if (m) {
      m.setIcon(L.divIcon({
        className: '',
        html: `<div style="background:white;border:2px solid #c8a84b;border-radius:8px;padding:3px 7px;font-family:'DM Sans',sans-serif;font-size:11px;font-weight:600;white-space:nowrap;box-shadow:0 2px 8px rgba(0,0,0,0.12);cursor:pointer;">${c.flag} ${topName}</div>`,
        iconSize: [null, null], iconAnchor: [0, 0]
      }));
    }
  });
}

// MODAL
function openModal() {
  const sel = document.getElementById('countrySelect');
  if (!sel.options.length) {
    COUNTRIES.sort((a,b) => a.name.localeCompare(b.name)).forEach(c => {
      const opt = document.createElement('option');
      opt.value = c.name;
      opt.textContent = `${c.flag} ${c.name}`;
      if (window.selectedCountry && c.name === window.selectedCountry) opt.selected = true;
      sel.appendChild(opt);
    });
  }
  document.getElementById('modalOverlay').classList.add('open');
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('open');
  document.getElementById('nameInput').value = '';
  document.getElementById('regionInput').value = '';
}

document.getElementById('modalOverlay').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});

async function submitName() {
  const name = document.getElementById('nameInput').value.trim();
  const country = document.getElementById('countrySelect').value;
  if (!name) { showToast('Please enter your name!'); return; }
  if (!country) { showToast('Please select a country!'); return; }

  const cap = name.charAt(0).toUpperCase() + name.slice(1).toLowerCase();
  const btn = document.getElementById('submitBtn');
  btn.disabled = true;
  btn.textContent = 'Saving…';

  try {
    if (window._firebaseReady && window._db) {
      await window._addDoc(window._collection(window._db, "names"), {
        name: cap,
        country: country,
        region: document.getElementById('regionInput').value.trim(),
        timestamp: new Date().toISOString()
      });
    } else {
      // Fallback if Firebase not ready
      if (!window.nameData[country]) window.nameData[country] = {};
      window.nameData[country][cap] = (window.nameData[country][cap] || 0) + 1;
      updateStats();
      renderSidebar();
      refreshMarkers();
    }

    // Update today count
    const today = new Date().toDateString();
    const savedDate = localStorage.getItem('nw_date');
    const todayCount = savedDate === today ? (parseInt(localStorage.getItem('nw_today')) || 0) : 0;
    localStorage.setItem('nw_today', (todayCount + 1).toString());
    localStorage.setItem('nw_date', today);
    document.getElementById('todayCount').textContent = todayCount + 1;

    closeModal();
    showToast(`✅ "${cap}" added to ${country}!`);
  } catch (err) {
    showToast('Something went wrong, try again!');
    console.error(err);
  }

  btn.disabled = false;
  btn.textContent = '🌍 Add My Name to the Map';
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}

// INIT
renderSidebar();
initMap();
updateStats();
</script>
</body>
</html>
