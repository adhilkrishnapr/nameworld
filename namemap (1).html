<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NameWorld — See What the World is Named</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
  :root {
    --ink: #0d0d0d;
    --cream: #f5f0e8;
    --gold: #c8a84b;
    --gold-light: #e8d5a0;
    --rust: #c0392b;
    --teal: #1a6b6b;
    --card: #ffffff;
    --border: #e0d8cc;
    --shadow: 0 4px 24px rgba(0,0,0,0.10);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--cream);
    color: var(--ink);
    min-height: 100vh;
  }

  /* HEADER */
  header {
    background: var(--ink);
    color: var(--cream);
    padding: 0 2rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 64px;
    position: sticky;
    top: 0;
    z-index: 1000;
    box-shadow: 0 2px 20px rgba(0,0,0,0.3);
  }

  .logo {
    font-family: 'Playfair Display', serif;
    font-size: 1.6rem;
    font-weight: 900;
    letter-spacing: -0.5px;
  }
  .logo span { color: var(--gold); }

  .header-right { display: flex; align-items: center; gap: 1rem; }

  .live-badge {
    display: flex; align-items: center; gap: 6px;
    background: rgba(200,168,75,0.15);
    border: 1px solid var(--gold);
    padding: 4px 12px;
    border-radius: 20px;
    font-size: 0.75rem;
    font-weight: 500;
    color: var(--gold);
    letter-spacing: 0.5px;
  }
  .live-dot {
    width: 7px; height: 7px;
    background: #2ecc71;
    border-radius: 50%;
    animation: pulse 1.5s infinite;
  }
  @keyframes pulse {
    0%,100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.5; transform: scale(0.8); }
  }

  .add-name-btn {
    background: var(--gold);
    color: var(--ink);
    border: none;
    padding: 8px 20px;
    border-radius: 6px;
    font-family: 'DM Sans', sans-serif;
    font-weight: 500;
    font-size: 0.9rem;
    cursor: pointer;
    transition: all 0.2s;
  }
  .add-name-btn:hover { background: var(--gold-light); transform: translateY(-1px); }

  /* STATS BAR */
  .stats-bar {
    background: var(--ink);
    border-top: 1px solid #222;
    padding: 8px 2rem;
    display: flex;
    gap: 2rem;
    justify-content: center;
  }
  .stat {
    color: #aaa;
    font-size: 0.8rem;
    display: flex; align-items: center; gap: 6px;
  }
  .stat strong { color: var(--gold); font-size: 1rem; }

  /* MAIN LAYOUT */
  .main {
    display: grid;
    grid-template-columns: 320px 1fr;
    height: calc(100vh - 64px - 38px);
  }

  /* SIDEBAR */
  .sidebar {
    background: var(--card);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .sidebar-header {
    padding: 1.2rem 1.2rem 0.8rem;
    border-bottom: 1px solid var(--border);
  }

  .sidebar-title {
    font-family: 'Playfair Display', serif;
    font-size: 1.1rem;
    font-weight: 700;
    margin-bottom: 0.6rem;
  }

  .search-box {
    display: flex;
    align-items: center;
    gap: 8px;
    background: var(--cream);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px 12px;
  }
  .search-box input {
    border: none;
    background: transparent;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.9rem;
    width: 100%;
    outline: none;
    color: var(--ink);
  }
  .search-box svg { flex-shrink: 0; opacity: 0.4; }

  /* REGION FILTER */
  .region-filter {
    padding: 0.8rem 1.2rem;
    border-bottom: 1px solid var(--border);
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
  }
  .region-btn {
    background: none;
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 4px 12px;
    font-size: 0.75rem;
    font-family: 'DM Sans', sans-serif;
    cursor: pointer;
    transition: all 0.15s;
    color: var(--ink);
  }
  .region-btn.active {
    background: var(--ink);
    color: var(--cream);
    border-color: var(--ink);
  }
  .region-btn:hover:not(.active) { background: var(--cream); }

  /* COUNTRY LIST */
  .country-list {
    overflow-y: auto;
    flex: 1;
    padding: 0.5rem;
  }
  .country-list::-webkit-scrollbar { width: 4px; }
  .country-list::-webkit-scrollbar-track { background: transparent; }
  .country-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .country-card {
    border-radius: 10px;
    padding: 0.9rem;
    margin-bottom: 6px;
    cursor: pointer;
    transition: all 0.15s;
    border: 1px solid transparent;
  }
  .country-card:hover { background: var(--cream); border-color: var(--border); }
  .country-card.selected { background: #fff8ec; border-color: var(--gold); }

  .country-card-header {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 6px;
  }
  .flag { font-size: 1.4rem; }
  .country-name {
    font-weight: 500;
    font-size: 0.9rem;
    flex: 1;
  }
  .count-badge {
    background: var(--cream);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 2px 8px;
    font-size: 0.7rem;
    color: #666;
  }

  .top-names {
    display: flex;
    flex-wrap: wrap;
    gap: 4px;
  }
  .name-chip {
    background: var(--ink);
    color: var(--cream);
    border-radius: 4px;
    padding: 2px 8px;
    font-size: 0.72rem;
    font-weight: 500;
  }
  .name-chip.rank-1 { background: var(--gold); color: var(--ink); }
  .name-chip.rank-2 { background: #888; }
  .name-chip.rank-3 { background: #a0785a; }

  /* MAP */
  #map {
    width: 100%;
    height: 100%;
    z-index: 1;
  }

  /* DETAIL PANEL (overlay on map) */
  .detail-panel {
    position: absolute;
    top: 80px;
    right: 20px;
    width: 280px;
    background: white;
    border-radius: 14px;
    box-shadow: var(--shadow);
    z-index: 500;
    display: none;
    animation: slideIn 0.2s ease;
    border: 1px solid var(--border);
  }
  @keyframes slideIn {
    from { opacity: 0; transform: translateX(20px); }
    to { opacity: 1; transform: translateX(0); }
  }
  .detail-panel.visible { display: block; }

  .detail-header {
    background: var(--ink);
    color: var(--cream);
    padding: 1rem 1.2rem;
    border-radius: 14px 14px 0 0;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .detail-title {
    font-family: 'Playfair Display', serif;
    font-size: 1.1rem;
    font-weight: 700;
  }
  .close-btn {
    background: none;
    border: none;
    color: #aaa;
    cursor: pointer;
    font-size: 1.2rem;
    line-height: 1;
    transition: color 0.15s;
  }
  .close-btn:hover { color: white; }

  .detail-body { padding: 1rem; }

  .rank-list { list-style: none; }
  .rank-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 6px;
    border-bottom: 1px solid var(--cream);
    transition: background 0.1s;
    border-radius: 6px;
  }
  .rank-item:last-child { border-bottom: none; }
  .rank-item:hover { background: var(--cream); }
  .rank-num {
    width: 24px;
    height: 24px;
    border-radius: 50%;
    background: #eee;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.75rem;
    font-weight: 700;
    flex-shrink: 0;
  }
  .rank-num.r1 { background: var(--gold); color: var(--ink); }
  .rank-num.r2 { background: #bbb; color: white; }
  .rank-num.r3 { background: #c8956a; color: white; }

  .rank-name { font-weight: 500; font-size: 0.9rem; flex: 1; }
  .rank-bar-wrap { width: 60px; }
  .rank-bar {
    height: 4px;
    background: var(--gold);
    border-radius: 2px;
    transition: width 0.4s;
  }
  .rank-count { font-size: 0.75rem; color: #888; width: 28px; text-align: right; }

  /* MODAL */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.6);
    z-index: 2000;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.2s;
  }
  .modal-overlay.open { opacity: 1; pointer-events: all; }

  .modal {
    background: white;
    border-radius: 16px;
    width: 420px;
    max-width: 95vw;
    overflow: hidden;
    transform: translateY(20px);
    transition: transform 0.2s;
  }
  .modal-overlay.open .modal { transform: translateY(0); }

  .modal-header {
    background: var(--ink);
    padding: 1.5rem;
    color: var(--cream);
  }
  .modal-header h2 {
    font-family: 'Playfair Display', serif;
    font-size: 1.4rem;
    font-weight: 700;
    margin-bottom: 4px;
  }
  .modal-header p { color: #aaa; font-size: 0.85rem; }

  .modal-body { padding: 1.5rem; }

  .form-group { margin-bottom: 1rem; }
  .form-group label {
    display: block;
    font-size: 0.8rem;
    font-weight: 500;
    margin-bottom: 6px;
    color: #555;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .form-group input,
  .form-group select {
    width: 100%;
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 12px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.95rem;
    outline: none;
    transition: border-color 0.15s;
    background: var(--cream);
    color: var(--ink);
  }
  .form-group input:focus,
  .form-group select:focus { border-color: var(--gold); background: white; }

  .submit-btn {
    width: 100%;
    background: var(--ink);
    color: var(--cream);
    border: none;
    padding: 12px;
    border-radius: 8px;
    font-family: 'DM Sans', sans-serif;
    font-weight: 500;
    font-size: 1rem;
    cursor: pointer;
    transition: all 0.2s;
    margin-top: 0.5rem;
  }
  .submit-btn:hover { background: #222; transform: translateY(-1px); }

  .cancel-link {
    display: block;
    text-align: center;
    margin-top: 0.8rem;
    color: #888;
    font-size: 0.85rem;
    cursor: pointer;
  }
  .cancel-link:hover { color: var(--ink); }

  /* TOAST */
  .toast {
    position: fixed;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--ink);
    color: var(--cream);
    padding: 12px 24px;
    border-radius: 30px;
    font-size: 0.9rem;
    z-index: 3000;
    transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1);
    pointer-events: none;
    border: 1px solid var(--gold);
  }
  .toast.show { transform: translateX(-50%) translateY(0); }

  /* SEARCH RESULTS */
  .search-results {
    padding: 0.5rem;
  }
  .search-result-item {
    padding: 10px 12px;
    border-radius: 8px;
    cursor: pointer;
    transition: background 0.1s;
    border-bottom: 1px solid var(--cream);
  }
  .search-result-item:hover { background: var(--cream); }
  .sr-name { font-weight: 600; font-size: 0.95rem; }
  .sr-locs { font-size: 0.78rem; color: #888; margin-top: 2px; }

  .no-results { padding: 2rem; text-align: center; color: #aaa; font-size: 0.9rem; }

  /* Map popup style override */
  .leaflet-popup-content-wrapper {
    border-radius: 10px !important;
    box-shadow: var(--shadow) !important;
    padding: 0 !important;
    overflow: hidden;
  }
  .leaflet-popup-content { margin: 0 !important; }
  .popup-inner { padding: 12px 14px; min-width: 150px; }
  .popup-flag { font-size: 1.5rem; }
  .popup-country { font-weight: 700; font-size: 0.95rem; margin: 4px 0 6px; }
  .popup-top { font-size: 0.8rem; color: #555; }
  .popup-name { font-weight: 600; color: var(--teal); }

  @media (max-width: 700px) {
    .main { grid-template-columns: 1fr; grid-template-rows: 45vh 1fr; }
    .sidebar { order: 2; height: 100%; }
    #map { height: 45vh; }
    .detail-panel { right: 10px; width: 240px; top: 60px; }
    .stats-bar { gap: 1rem; padding: 8px 1rem; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">Name<span>World</span></div>
  <div class="header-right">
    <div class="live-badge"><div class="live-dot"></div> LIVE</div>
    <button class="add-name-btn" onclick="openModal()">+ Add My Name</button>
  </div>
</header>

<div class="stats-bar">
  <div class="stat"><strong id="totalNames">0</strong> names submitted</div>
  <div class="stat"><strong id="totalCountries">0</strong> countries represented</div>
  <div class="stat"><strong id="todayCount">0</strong> added today</div>
</div>

<div class="main" style="position:relative;">

  <!-- SIDEBAR -->
  <div class="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-title">🌍 Popular Names by Region</div>
      <div class="search-box">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        <input type="text" id="searchInput" placeholder="Search a name or country…" oninput="handleSearch(this.value)">
      </div>
    </div>
    <div class="region-filter">
      <button class="region-btn active" onclick="filterRegion('all', this)">All</button>
      <button class="region-btn" onclick="filterRegion('Americas', this)">Americas</button>
      <button class="region-btn" onclick="filterRegion('Europe', this)">Europe</button>
      <button class="region-btn" onclick="filterRegion('Asia', this)">Asia</button>
      <button class="region-btn" onclick="filterRegion('Africa', this)">Africa</button>
      <button class="region-btn" onclick="filterRegion('Oceania', this)">Oceania</button>
    </div>
    <div class="country-list" id="countryList"></div>
  </div>

  <!-- MAP -->
  <div style="position:relative; flex:1;">
    <div id="map"></div>

    <!-- Detail Panel -->
    <div class="detail-panel" id="detailPanel">
      <div class="detail-header">
        <div>
          <div id="dpFlag" style="font-size:1.2rem"></div>
          <div class="detail-title" id="dpName"></div>
        </div>
        <button class="close-btn" onclick="closeDetail()">✕</button>
      </div>
      <div class="detail-body">
        <div style="font-size:0.75rem;color:#aaa;margin-bottom:8px;text-transform:uppercase;letter-spacing:0.5px;">Top 10 Names</div>
        <ul class="rank-list" id="dpList"></ul>
      </div>
    </div>
  </div>

</div>

<!-- MODAL -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <div class="modal-header">
      <h2>Add Your Name</h2>
      <p>Help us map the world's names — one person at a time</p>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label>Your First Name</label>
        <input type="text" id="nameInput" placeholder="e.g. Maria, James, Yuki…" maxlength="40">
      </div>
      <div class="form-group">
        <label>Your Country</label>
        <select id="countrySelect"></select>
      </div>
      <div class="form-group">
        <label>State / Region <span style="color:#aaa;font-weight:300">(optional)</span></label>
        <input type="text" id="regionInput" placeholder="e.g. California, Bavaria…" maxlength="60">
      </div>
      <button class="submit-btn" onclick="submitName()">🌍 Add My Name to the Map</button>
      <div class="cancel-link" onclick="closeModal()">Cancel</div>
    </div>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

// ─── STATE ───────────────────────────────────────────────────────────────────
let nameData = {}; // { countryName: { name: count } }
let selectedRegion = 'all';
let selectedCountry = null;
let todayCount = 0;

function initData() {
  const saved = localStorage.getItem('nameworld_data');
  const savedToday = localStorage.getItem('nameworld_today');
  const savedDate = localStorage.getItem('nameworld_date');
  const today = new Date().toDateString();

  if (saved) {
    nameData = JSON.parse(saved);
  } else {
    // seed with sample data
    COUNTRIES.forEach(c => {
      nameData[c.name] = {};
      const seeds = SEED_NAMES[c.name] || [];
      seeds.forEach((n, i) => {
        nameData[c.name][n] = Math.floor(Math.random() * 80) + 5 + (seeds.length - i) * 3;
      });
    });
    saveData();
  }

  todayCount = (savedDate === today && savedToday) ? parseInt(savedToday) : 0;
  updateStats();
}

function saveData() {
  localStorage.setItem('nameworld_data', JSON.stringify(nameData));
  localStorage.setItem('nameworld_today', todayCount.toString());
  localStorage.setItem('nameworld_date', new Date().toDateString());
}

function getTopNames(country, n = 10) {
  const data = nameData[country] || {};
  return Object.entries(data)
    .sort((a, b) => b[1] - a[1])
    .slice(0, n);
}

function updateStats() {
  let total = 0, countries = 0;
  COUNTRIES.forEach(c => {
    const d = nameData[c.name] || {};
    const s = Object.values(d).reduce((a, b) => a + b, 0);
    if (s > 0) countries++;
    total += s;
  });
  document.getElementById('totalNames').textContent = total.toLocaleString();
  document.getElementById('totalCountries').textContent = countries;
  document.getElementById('todayCount').textContent = todayCount;
}

// ─── SIDEBAR ─────────────────────────────────────────────────────────────────
function renderSidebar(filter = '') {
  const list = document.getElementById('countryList');

  if (filter.length > 1) {
    renderSearch(filter, list);
    return;
  }

  const visible = COUNTRIES.filter(c =>
    selectedRegion === 'all' || c.region === selectedRegion
  );

  list.innerHTML = visible.map(c => {
    const top = getTopNames(c.name, 5);
    const total = Object.values(nameData[c.name] || {}).reduce((a,b)=>a+b,0);
    const chips = top.slice(0, 5).map(([ n ], i) =>
      `<span class="name-chip rank-${i+1}">${n}</span>`
    ).join('');
    const sel = selectedCountry === c.name ? 'selected' : '';
    return `
      <div class="country-card ${sel}" onclick="selectCountry('${c.name}')">
        <div class="country-card-header">
          <span class="flag">${c.flag}</span>
          <span class="country-name">${c.name}</span>
          <span class="count-badge">${total}</span>
        </div>
        <div class="top-names">${chips}</div>
      </div>`;
  }).join('');
}

function renderSearch(q, list) {
  const lq = q.toLowerCase();
  // Find countries matching
  const matchCountries = COUNTRIES.filter(c => c.name.toLowerCase().includes(lq));
  // Find names matching across countries
  const nameMatches = [];
  COUNTRIES.forEach(c => {
    const data = nameData[c.name] || {};
    Object.entries(data).forEach(([n, count]) => {
      if (n.toLowerCase().includes(lq)) {
        nameMatches.push({ name: n, country: c.name, flag: c.flag, count });
      }
    });
  });
  // Group name matches
  const grouped = {};
  nameMatches.forEach(m => {
    if (!grouped[m.name]) grouped[m.name] = [];
    grouped[m.name].push(m);
  });

  let html = '<div class="search-results">';
  if (matchCountries.length === 0 && Object.keys(grouped).length === 0) {
    html += '<div class="no-results">No results found</div>';
  }
  matchCountries.forEach(c => {
    const top = getTopNames(c.name, 3).map(([n])=>n).join(', ');
    html += `<div class="search-result-item" onclick="selectCountry('${c.name}')">
      <div class="sr-name">${c.flag} ${c.name}</div>
      <div class="sr-locs">Top: ${top}</div>
    </div>`;
  });
  Object.entries(grouped).sort((a,b)=>b[1].reduce((s,m)=>s+m.count,0)-a[1].reduce((s,m)=>s+m.count,0)).forEach(([name, locs]) => {
    const places = locs.map(l => `${l.flag} ${l.country}`).join(', ');
    html += `<div class="search-result-item" onclick="searchSelectName('${name}')">
      <div class="sr-name">👤 ${name}</div>
      <div class="sr-locs">${places}</div>
    </div>`;
  });
  html += '</div>';
  list.innerHTML = html;
}

function searchSelectName(name) {
  document.getElementById('searchInput').value = name;
  showToast(`Showing "${name}" across the world`);
  // highlight on map - simplified: just show detail for top country
  let best = null, bestCount = 0;
  COUNTRIES.forEach(c => {
    const count = (nameData[c.name] || {})[name] || 0;
    if (count > bestCount) { bestCount = count; best = c.name; }
  });
  if (best) selectCountry(best);
}

function filterRegion(region, btn) {
  selectedRegion = region;
  document.querySelectorAll('.region-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('searchInput').value = '';
  renderSidebar();
}

function handleSearch(val) {
  renderSidebar(val.trim());
}

// ─── COUNTRY SELECTION ────────────────────────────────────────────────────────
function selectCountry(name) {
  selectedCountry = name;
  renderSidebar(document.getElementById('searchInput').value.trim());
  showDetail(name);
  const c = COUNTRIES.find(x => x.name === name);
  if (c) map.setView([c.lat, c.lng], 5, { animate: true });
}

function showDetail(name) {
  const c = COUNTRIES.find(x => x.name === name);
  if (!c) return;
  const top = getTopNames(name, 10);
  const maxCount = top[0] ? top[0][1] : 1;

  document.getElementById('dpFlag').textContent = c.flag;
  document.getElementById('dpName').textContent = c.name;
  document.getElementById('dpList').innerHTML = top.map(([n, count], i) => {
    const rClass = i === 0 ? 'r1' : i === 1 ? 'r2' : i === 2 ? 'r3' : '';
    const pct = Math.round((count / maxCount) * 100);
    return `<li class="rank-item">
      <div class="rank-num ${rClass}">${i+1}</div>
      <div class="rank-name">${n}</div>
      <div class="rank-bar-wrap"><div class="rank-bar" style="width:${pct}%"></div></div>
      <div class="rank-count">${count}</div>
    </li>`;
  }).join('');

  document.getElementById('detailPanel').classList.add('visible');
}

function closeDetail() {
  document.getElementById('detailPanel').classList.remove('visible');
  selectedCountry = null;
  renderSidebar();
}

// ─── MAP ──────────────────────────────────────────────────────────────────────
let map;
const markers = {};

function initMap() {
  map = L.map('map', {
    center: [20, 10],
    zoom: 2,
    zoomControl: true,
    attributionControl: false
  });

  L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
    maxZoom: 19
  }).addTo(map);

  COUNTRIES.forEach(c => {
    const top = getTopNames(c.name, 1);
    const topName = top[0] ? top[0][0] : '—';

    const icon = L.divIcon({
      className: '',
      html: `<div style="
        background:white;
        border:2px solid #c8a84b;
        border-radius:8px;
        padding:3px 7px;
        font-family:'DM Sans',sans-serif;
        font-size:11px;
        font-weight:600;
        white-space:nowrap;
        box-shadow:0 2px 8px rgba(0,0,0,0.12);
        cursor:pointer;
        transition:all .15s;
      ">${c.flag} ${topName}</div>`,
      iconSize: [null, null],
      iconAnchor: [0, 0]
    });

    const marker = L.marker([c.lat, c.lng], { icon })
      .addTo(map)
      .on('click', () => selectCountry(c.name));

    markers[c.name] = marker;
  });
}

function refreshMarkers() {
  COUNTRIES.forEach(c => {
    const top = getTopNames(c.name, 1);
    const topName = top[0] ? top[0][0] : '—';
    const m = markers[c.name];
    if (m) {
      m.setIcon(L.divIcon({
        className: '',
        html: `<div style="
          background:white;
          border:2px solid #c8a84b;
          border-radius:8px;
          padding:3px 7px;
          font-family:'DM Sans',sans-serif;
          font-size:11px;
          font-weight:600;
          white-space:nowrap;
          box-shadow:0 2px 8px rgba(0,0,0,0.12);
          cursor:pointer;
        ">${c.flag} ${topName}</div>`,
        iconSize: [null, null],
        iconAnchor: [0, 0]
      }));
    }
  });
}

// ─── MODAL ────────────────────────────────────────────────────────────────────
function openModal() {
  const sel = document.getElementById('countrySelect');
  if (!sel.options.length) {
    COUNTRIES.sort((a,b) => a.name.localeCompare(b.name)).forEach(c => {
      const opt = document.createElement('option');
      opt.value = c.name;
      opt.textContent = `${c.flag} ${c.name}`;
      if (selectedCountry && c.name === selectedCountry) opt.selected = true;
      sel.appendChild(opt);
    });
  }
  document.getElementById('modalOverlay').classList.add('open');
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('open');
  document.getElementById('nameInput').value = '';
  document.getElementById('regionInput').value = '';
}

document.getElementById('modalOverlay').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});

function submitName() {
  const name = document.getElementById('nameInput').value.trim();
  const country = document.getElementById('countrySelect').value;
  if (!name) { showToast('Please enter your name!'); return; }
  if (!country) { showToast('Please select a country!'); return; }

  if (!nameData[country]) nameData[country] = {};
  const cap = name.charAt(0).toUpperCase() + name.slice(1).toLowerCase();
  nameData[country][cap] = (nameData[country][cap] || 0) + 1;

  todayCount++;
  saveData();
  updateStats();
  refreshMarkers();

  if (selectedCountry === country) showDetail(country);
  renderSidebar(document.getElementById('searchInput').value.trim());

  closeModal();
  showToast(`✅ "${cap}" added to ${country}!`);
}

// ─── TOAST ────────────────────────────────────────────────────────────────────
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}

// ─── INIT ─────────────────────────────────────────────────────────────────────
initData();
renderSidebar();
initMap();
</script>
